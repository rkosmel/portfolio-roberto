<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1584, initial-scale=1" />
<title>LinkedIn Cover - Roberto Kosmel</title>
<style>
  :root {
    --bg: #08111f;
    --panel: #101827;
    --panel-2: #0b2a2a;
    --text: #f8fafc;
    --muted: #a7b4c8;
    --line: #27445d;
    --cyan: #38bdf8;
    --teal: #2dd4bf;
    --mint: #8ee7d2;
    --amber: #f6c85f;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    width: 1584px;
    height: 396px;
    overflow: hidden;
    background: var(--bg);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .cover {
    position: relative;
    width: 1584px;
    height: 396px;
    color: var(--text);
    background:
      linear-gradient(115deg, rgba(8, 17, 31, 0.98) 0%, rgba(14, 25, 38, 0.98) 48%, rgba(8, 40, 36, 0.96) 100%),
      linear-gradient(90deg, rgba(56, 189, 248, 0.12), rgba(45, 212, 191, 0.10));
  }

  .cover::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: linear-gradient(90deg, transparent 0%, rgba(0, 0, 0, 0.70) 24%, rgba(0, 0, 0, 1) 100%);
  }

  .safe-space {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 330px;
    height: 190px;
    background: linear-gradient(90deg, rgba(8, 17, 31, 0.55), rgba(8, 17, 31, 0));
  }

  .content {
    position: absolute;
    left: 360px;
    top: 72px;
    width: 680px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 22px;
    color: var(--mint);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0;
  }

  .eyebrow::before {
    content: "";
    width: 42px;
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--cyan), var(--teal));
  }

  h1 {
    margin: 0;
    color: var(--text);
    font-size: 54px;
    line-height: 1.02;
    font-weight: 850;
    letter-spacing: 0;
  }

  .tagline {
    margin-top: 18px;
    color: #d8eef2;
    font-size: 27px;
    line-height: 1.25;
    font-weight: 650;
    letter-spacing: 0;
  }

  .stack {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 30px;
    color: var(--muted);
    font-size: 19px;
    line-height: 1;
    font-weight: 650;
    letter-spacing: 0;
  }

  .stack span {
    color: var(--amber);
  }

  svg {
    position: absolute;
    inset: 0;
    width: 1584px;
    height: 396px;
  }

  .node {
    fill: rgba(16, 24, 39, 0.82);
    stroke-width: 2;
  }

  .node-text {
    fill: #eef7ff;
    font-size: 18px;
    font-weight: 750;
    letter-spacing: 0;
  }

  .node-sub {
    fill: #9db3c7;
    font-size: 13px;
    font-weight: 650;
    letter-spacing: 0;
  }
</style>
</head>
<body>
<main class="cover" aria-label="LinkedIn cover for Roberto Kosmel">
  <div class="safe-space" aria-hidden="true"></div>

  <section class="content">
    <div class="eyebrow">Software • Product • Cloud</div>
    <h1>Roberto Kosmel</h1>
    <div class="tagline">Junior Full Stack Developer</div>
    <div class="stack">
      TypeScript <span>•</span> React <span>•</span> Node.js <span>•</span> Databases <span>•</span> Cloud
    </div>
  </section>

  <svg viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Abstract full stack product architecture">
    <defs>
      <linearGradient id="nodeA" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#123449" />
        <stop offset="1" stop-color="#101827" />
      </linearGradient>
      <linearGradient id="nodeB" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#0f3b36" />
        <stop offset="1" stop-color="#101827" />
      </linearGradient>
      <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#38bdf8" stop-opacity="0.35" />
        <stop offset="0.55" stop-color="#2dd4bf" stop-opacity="0.95" />
        <stop offset="1" stop-color="#f6c85f" stop-opacity="0.75" />
      </linearGradient>
      <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="2.5" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>

    <g opacity="0.20">
      <path d="M1094 58 H1486" stroke="#8ee7d2" stroke-width="1" />
      <path d="M1094 338 H1486" stroke="#38bdf8" stroke-width="1" />
      <path d="M1498 76 V318" stroke="#f6c85f" stroke-width="1" />
    </g>

    <g filter="url(#softGlow)">
      <path d="M1130 136 H1258" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round" />
      <path d="M1258 136 C1308 136 1314 199 1364 199" stroke="url(#lineGrad)" stroke-width="4" fill="none" stroke-linecap="round" />
      <path d="M1258 136 C1308 136 1314 276 1364 276" stroke="url(#lineGrad)" stroke-width="4" fill="none" stroke-linecap="round" />
      <path d="M1164 199 H1364" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round" opacity="0.72" />
      <path d="M1164 276 H1364" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round" opacity="0.58" />
    </g>

    <g>
      <rect class="node" x="1040" y="96" width="132" height="80" rx="8" fill="url(#nodeA)" stroke="#38bdf8" />
      <text class="node-text" x="1106" y="131" text-anchor="middle">Web / Mobile</text>
      <text class="node-sub" x="1106" y="154" text-anchor="middle">interfaces</text>
    </g>

    <g>
      <rect class="node" x="1258" y="98" width="126" height="76" rx="8" fill="url(#nodeB)" stroke="#2dd4bf" />
      <text class="node-text" x="1321" y="132" text-anchor="middle">API</text>
      <text class="node-sub" x="1321" y="154" text-anchor="middle">services</text>
    </g>

    <g>
      <rect class="node" x="1364" y="160" width="138" height="78" rx="8" fill="url(#nodeA)" stroke="#38bdf8" />
      <text class="node-text" x="1433" y="194" text-anchor="middle">Data</text>
      <text class="node-sub" x="1433" y="216" text-anchor="middle">models</text>
    </g>

    <g>
      <rect class="node" x="1364" y="238" width="138" height="78" rx="8" fill="url(#nodeB)" stroke="#2dd4bf" />
      <text class="node-text" x="1433" y="272" text-anchor="middle">Cloud</text>
      <text class="node-sub" x="1433" y="294" text-anchor="middle">deploy</text>
    </g>

    <g opacity="0.90">
      <rect x="1040" y="220" width="180" height="96" rx="8" fill="rgba(16, 24, 39, 0.58)" stroke="#f6c85f" stroke-width="2" />
      <text x="1130" y="255" text-anchor="middle" fill="#fff7d6" font-size="18" font-weight="750" letter-spacing="0">Product</text>
      <text x="1130" y="280" text-anchor="middle" fill="#cdd8e5" font-size="13" font-weight="650" letter-spacing="0">requirements → backlog</text>
    </g>

    <g opacity="0.88">
      <path d="M1015 336 H1514" stroke="#27445d" stroke-width="2" />
      <circle cx="1060" cy="336" r="5" fill="#38bdf8" />
      <circle cx="1220" cy="336" r="5" fill="#2dd4bf" />
      <circle cx="1380" cy="336" r="5" fill="#f6c85f" />
      <text x="1060" y="362" text-anchor="middle" fill="#a7b4c8" font-size="13" font-weight="650" letter-spacing="0">discover</text>
      <text x="1220" y="362" text-anchor="middle" fill="#a7b4c8" font-size="13" font-weight="650" letter-spacing="0">build</text>
      <text x="1380" y="362" text-anchor="middle" fill="#a7b4c8" font-size="13" font-weight="650" letter-spacing="0">learn</text>
    </g>
  </svg>
</main>
</body>
</html>
