:root{
  --gold:#e7b552; --copper:#d2814c; --ember:#e8643c;
  --text:#f8f1e6; --muted:#cabda6;
  --display:'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  --mono:'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;width:1584px;height:396px;overflow:hidden;background:#0d0a07;}
.cover{position:relative;width:1584px;height:396px;color:var(--text);font-family:var(--display);
  background:
    radial-gradient(120% 80% at 66% 60%, rgba(231,140,70,0.16), transparent 60%),
    linear-gradient(180deg, #0e0b07 0%, #140f0a 50%, #1b130c 66%, #0c0906 100%);
}
.art{position:absolute;inset:0;width:1584px;height:396px;z-index:1;}
/* left fade for text legibility */
.leftfade{position:absolute;left:0;top:0;width:760px;height:396px;z-index:2;
  background:linear-gradient(90deg, rgba(10,8,5,0.92) 0%, rgba(10,8,5,0.7) 34%, rgba(10,8,5,0) 64%);}
/* retro scanlines */
.scan{position:absolute;inset:0;z-index:3;pointer-events:none;opacity:0.16;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,0.9) 0px, rgba(0,0,0,0.9) 1px, transparent 1px, transparent 3px);}
.content{position:absolute;left:90px;top:80px;width:680px;z-index:4;}
.statement{margin:0;font-family:var(--mono);font-weight:500;font-size:34px;line-height:1.26;
  letter-spacing:1.8px;text-transform:uppercase;color:var(--gold);
  text-shadow:0 0 20px rgba(231,165,60,0.28);}
.statement b{color:#fdf7ec;font-weight:700;}

</style>
